name: Publish Images and Deploy

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: cxdb-prod-${{ github.ref }}
  cancel-in-progress: true

env:
  SERVER_IMAGE: ghcr.io/navanchauhan/cxdb-server
  GATEWAY_IMAGE: ghcr.io/navanchauhan/cxdb-gateway

jobs:
  images:
    name: Build and push images
    if: github.repository == 'navanchauhan/cxdb'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.SERVER_IMAGE }}:main
            ${{ env.SERVER_IMAGE }}:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/navanchauhan/cxdb
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha,scope=cxdb-server
          cache-to: type=gha,scope=cxdb-server,mode=max

      - name: Build and push gateway image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: gateway/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.GATEWAY_IMAGE }}:main
            ${{ env.GATEWAY_IMAGE }}:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/navanchauhan/cxdb
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha,scope=cxdb-gateway
          cache-to: type=gha,scope=cxdb-gateway,mode=max

  deploy:
    name: Trigger Coolify
    needs: images
    if: github.repository == 'navanchauhan/cxdb' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deployment
        env:
          COOLIFY_URL: ${{ secrets.COOLIFY_URL }}
          COOLIFY_API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
          COOLIFY_APPLICATION_UUID: ${{ secrets.COOLIFY_APPLICATION_UUID }}
        run: |
          set -euo pipefail
          : "${COOLIFY_URL:?COOLIFY_URL is required}"
          : "${COOLIFY_API_TOKEN:?COOLIFY_API_TOKEN is required}"
          : "${COOLIFY_APPLICATION_UUID:?COOLIFY_APPLICATION_UUID is required}"

          curl -fsS -X POST \
            -H "Authorization: Bearer ${COOLIFY_API_TOKEN}" \
            -H "Content-Type: application/json" \
            "${COOLIFY_URL%/}/api/v1/deploy?uuid=${COOLIFY_APPLICATION_UUID}&force=false"
